controller_manager:
  ros__parameters:
    use_sim_time: True
    update_rate: 250  # Hz

    joint_states_controller:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_group_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_group_effort_controller:
  ros__parameters:
    use_sim_time: True
    joints:
      - FL_hip_yaw
      - FL_thigh_pitch
      - FL_knee_pitch
      - FR_hip_yaw
      - FR_thigh_pitch
      - FR_knee_pitch
      - BL_hip_yaw
      - BL_thigh_pitch
      - BL_knee_pitch
      - BR_hip_yaw
      - BR_thigh_pitch
      - BR_knee_pitch
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity

    gains:
      FL_hip_yaw     : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      FL_thigh_pitch : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      FL_knee_pitch  : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      FR_hip_yaw     : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      FR_thigh_pitch : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      FR_knee_pitch  : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      BL_hip_yaw     : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      BL_thigh_pitch : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      BL_knee_pitch  : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      BR_hip_yaw     : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      BR_thigh_pitch : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
      BR_knee_pitch  : {p: 80.0, i: 0.15, d: 0.8, i_clamp: 2.0}
