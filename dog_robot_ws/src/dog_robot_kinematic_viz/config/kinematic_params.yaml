kinematic_node:
  ros__parameters:
    publish_rate: 50.0
    active_legs: ["FL", "FR", "BL", "BR"]
    idle_joints: [0.0, 0.0, 0.0]
    step_freq: 1.5
    stride_per_mps: 0.20
    swing_height: 0.03
    stance_phase_ratio: 0.5
    pitch_min: -0.05
    pitch_max: +0.05
    # link_params_yaml + urdf_joints_yaml are injected by the launch file
    # via PathJoinSubstitution (absolute path required at node init time).
